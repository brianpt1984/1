name: Security Enhancement PR
description: Comprehensive security improvements for JSZip
title: "[SECURITY] Fix all vulnerabilities + Add proactive protections"
labels: 
  - security
  - enhancement
  - dependencies
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## 🛡️ Security Enhancement Summary
        
        This PR eliminates **all 40 known vulnerabilities** and adds proactive security features while maintaining 100% backward compatibility.
        
        ### Key Improvements
        - ✅ 0 vulnerabilities (was 40)
        - ✅ Path traversal protection
        - ✅ ZIP bomb detection
        - ✅ Enhanced input validation
        - ✅ Security monitoring tools
        
  - type: checkboxes
    id: testing
    attributes:
      label: Testing Verification
      description: Please verify these tests pass
      options:
        - label: "`npm audit` shows 0 vulnerabilities"
          required: true
        - label: "`npm run test-node` passes"
          required: true  
        - label: "`npm run security-check` passes"
          required: true
        - label: "Existing examples still work"
          required: true
          
  - type: checkboxes
    id: compatibility
    attributes:
      label: Compatibility Check
      description: Confirm no breaking changes
      options:
        - label: "No changes to public API"
          required: true
        - label: "All new features are optional"
          required: true
        - label: "Existing code works unchanged"
          required: true
          
  - type: textarea
    id: security-verification
    attributes:
      label: Security Verification
      description: |
        Run these commands to verify security improvements:
        ```bash
        npm install
        npm run security-check
        npm audit
        ```
      placeholder: Paste output here...
      
  - type: dropdown
    id: priority
    attributes:
      label: Priority Level
      description: How important is this security fix?
      options:
        - High - Contains critical security fixes
        - Medium - Important improvements
        - Low - Minor enhancements
      default: 0
